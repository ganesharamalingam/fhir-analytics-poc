<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <defs>
    <clipPath id="tri-clip">
      <polygon points="110,10 210,175 10,175"/>
    </clipPath>
  </defs>

  <!-- Main blue triangle -->
  <polygon points="110,10 210,175 10,175" fill="#1A7BCE"/>

  <!-- Three teal diagonal stripes clipped inside triangle -->
  <g clip-path="url(#tri-clip)">
    <line x1="55"  y1="185" x2="145" y2="5"  stroke="#2DD4C0" stroke-width="14" stroke-linecap="round"/>
    <line x1="78"  y1="185" x2="168" y2="5"  stroke="#2DD4C0" stroke-width="14" stroke-linecap="round"/>
    <line x1="101" y1="185" x2="191" y2="5"  stroke="#2DD4C0" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Triangle border for crispness -->
  <polygon points="110,10 210,175 10,175" fill="none" stroke="#1A7BCE" stroke-width="1"/>

  <!-- Teal orbital swoosh -->
  <ellipse cx="110" cy="178" rx="95" ry="14" fill="none" stroke="#2DD4C0" stroke-width="5"
           stroke-dasharray="330 100" stroke-dashoffset="60"/>

  <!-- "infinite" wordmark -->
  <text x="110" y="198" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="28" font-weight="700" letter-spacing="3"
        fill="#1a1a2e">infinite</text>

  <!-- TM mark -->
  <text x="194" y="178" text-anchor="start"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#1a1a2e">TM</text>
</svg>
