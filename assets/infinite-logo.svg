<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210" width="240" height="210">
  <defs>
    <clipPath id="tri-clip">
      <polygon points="120,8 218,172 22,172"/>
    </clipPath>
  </defs>

  <!-- Main blue triangle -->
  <polygon points="120,8 218,172 22,172" fill="#1872C4"/>

  <!-- Three teal diagonal stripes clipped inside triangle -->
  <g clip-path="url(#tri-clip)">
    <line x1="60"  y1="182" x2="158" y2="2"  stroke="#2DD4BF" stroke-width="16" stroke-linecap="butt"/>
    <line x1="86"  y1="182" x2="184" y2="2"  stroke="#2DD4BF" stroke-width="16" stroke-linecap="butt"/>
    <line x1="112" y1="182" x2="210" y2="2"  stroke="#2DD4BF" stroke-width="16" stroke-linecap="butt"/>
  </g>

  <!-- Teal orbital swoosh -->
  <ellipse cx="120" cy="173" rx="100" ry="13" fill="none" stroke="#2DD4BF" stroke-width="5.5"
           stroke-dasharray="340 120" stroke-dashoffset="68" stroke-linecap="round"/>

  <!-- "infinite" wordmark -->
  <text x="120" y="200" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="2"
        fill="#111827">infinite</text>

  <!-- TM mark -->
  <text x="210" y="14" text-anchor="start"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#111827">TM</text>
</svg>
