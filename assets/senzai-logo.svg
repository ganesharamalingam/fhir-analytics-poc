<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 172" width="140" height="172">
  <defs>
    <linearGradient id="sg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0A2848"/>
      <stop offset="45%"  stop-color="#1255A4"/>
      <stop offset="100%" stop-color="#1FC8C8"/>
    </linearGradient>
    <clipPath id="shield-clip">
      <!-- Parallelogram-style shield: flat-left, angled right, pointed bottom-right -->
      <polygon points="8,4 108,4 132,86 108,168 8,168"/>
    </clipPath>
  </defs>

  <!-- Outer shield shape -->
  <polygon points="8,4 108,4 132,86 108,168 8,168" fill="url(#sg)"/>

  <!-- White K-mark -->
  <!-- Left vertical bar -->
  <rect x="28" y="40" width="20" height="92" fill="white" rx="2"/>

  <!-- Upper arm of K -->
  <polygon points="48,86 96,40 116,40 68,86" fill="white"/>

  <!-- Lower arm of K -->
  <polygon points="48,86 116,132 96,132 68,86" fill="white"/>

  <!-- Inner negative space to create depth on K -->
  <polygon points="48,86 80,62 80,72 62,86 80,100 80,110" fill="url(#sg)"/>
</svg>
